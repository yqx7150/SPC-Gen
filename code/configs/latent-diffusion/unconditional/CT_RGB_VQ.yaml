model:
  base_learning_rate: 2.0e-06
  target: ldm.models.diffusion.ddpm.LatentDiffusion
  params:
    linear_start: 0.0015 #扩散过程中噪声添加的起始和结束噪声强度
    linear_end: 0.0195
    num_timesteps_cond: 1
    log_every_t: 200 #每训练200个时间步记录一次日志
    timesteps: 1000  #扩散过程的总时间步数
    first_stage_key: image
    image_size: 64
    channels: 3
    monitor: val/loss_simple_ema
    unet_config:
      target: ldm.modules.diffusionmodules.openaimodel.UNetModel
      params:
        image_size: 64
        in_channels: 3
        out_channels: 3
        model_channels: 224
        attention_resolutions: #注意力机制应用的下采样因子，对应空间分辨率为8 16 32
        # note: this isn\t actually the resolution but
        # the downsampling factor, i.e. this corresnponds to
        # attention on spatial resolution 8,16,32, as the
        # spatial reolution of the latents is 64 for f4
        - 8
        - 4
        - 2
        num_res_blocks: 1
        channel_mult: #不同分辨率下的通道数倍数
        - 1
        - 2
        - 3
        - 4
        num_head_channels: 32 #多头注意力机制中的头通道数为32
    first_stage_config: #VAE网络结构参数
      target: ldm.models.autoencoder.VQModelInterface
      params:
        embed_dim: 3
        n_embed: 8192
        ckpt_path: /mnt/D/yxb/stable-diffusion-master/models/first_stage_models/vq-f4/model.ckpt
        ddconfig:
          double_z: false
          z_channels: 3
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
          - 1
          - 2
          - 4
          num_res_blocks: 1
          attn_resolutions: []
          dropout: 0.0 #定义了 VAE 的网络结构，包括输入输出通道数、通道倍数、残差块数量等。
        lossconfig:
          target: torch.nn.Identity
    cond_stage_config: __is_unconditional__
data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 1
    num_workers: 1
    wrap: false
    train:
      target: ldm.data.PetData.PET_SIN_512_train
      params:
        size: 256
    validation:
      target: ldm.data.PetData.PET_SIN_512_val
      params:
        size: 256


lightning:
  callbacks:
    image_logger:
      target: main.ImageLogger
      params:
        batch_frequency: 5000
        max_images: 8
        increase_log_steps: False

  trainer:
    benchmark: True